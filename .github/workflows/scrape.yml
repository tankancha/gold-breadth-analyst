name: Daily Gold Breadth Scrape

on:
  schedule:
    # 23:50 UTC Sun-Thu == 06:50 Bangkok Mon-Fri
    - cron: "50 23 * * 0-4"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gold-breadth-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scraper/requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run scraper
        env:
          # Optional residential-proxy fallback. Configure under
          # Repo Settings → Secrets and variables → Actions if Cloudflare
          # blocks the default GHA runner egress.
          SCRAPE_PROXY_URL: ${{ secrets.SCRAPE_PROXY_URL }}
        run: python scraper/run.py

      - name: Mirror scrape into docs/data and stamp by Bangkok date
        run: |
          DATE=$(TZ=Asia/Bangkok date +%F)
          mkdir -p docs/data
          cp data/latest.json docs/data/latest.json
          cp data/latest.json "docs/data/${DATE}.json"
          echo "Wrote docs/data/${DATE}.json"

      - name: Build 5-day history rollup
        run: python scraper/build_history.py

      - name: Prune snapshots older than the 5 most recent dates
        run: |
          set -e
          # Keep the 5 most recent YYYY-MM-DD.json files in docs/data; delete the rest.
          # We sort by filename (date) descending and tail-from-line-6 onwards.
          ls -1 docs/data/[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9].json 2>/dev/null \
            | sort -r \
            | tail -n +6 \
            | xargs -r rm -f
          echo "Snapshots remaining:"
          ls -1 docs/data/[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9].json 2>/dev/null || true

      - name: Commit and push if anything changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            DATE=$(TZ=Asia/Bangkok date +%Y-%m-%d)
            git commit -m "data: scrape ${DATE} (GHA)"
            # Small retry guard against the Claude routine pushing concurrently.
            git pull --rebase origin main || true
            git push
          fi

      - name: Upload diagnostic artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-debug
          path: |
            scraper/debug_screenshot.png
            scraper/debug_page.html
            scraper/xhr_debug.json
          if-no-files-found: ignore
